apiVersion: v1
kind: Pod
metadata:
  name: eightton-builder
  namespace: aiops-app
  labels:
    app: eightton-builder
spec:
  containers:
  - name: builder
    image: gcr.io/kaniko-project/executor:debug
    command: ["sleep", "infinity"]
    volumeMounts:
    - name: docker-config
      mountPath: /kaniko/.docker
      readOnly: true
    # One-shot kaniko build pod (restartPolicy: Never). It idles on `sleep
    # infinity` between exec-driven builds, so requests are kept low to avoid
    # reserving cluster capacity while idle; limits stay generous for the
    # layer-extraction burst during an actual build.
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "4000m"
        memory: "8Gi"
  volumes:
  - name: docker-config
    secret:
      secretName: v2-zcr-cloudzcp-io-robot-secret
      items:
      - key: .dockerconfigjson
        path: config.json
  restartPolicy: Never
