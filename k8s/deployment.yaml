apiVersion: apps/v1
kind: Deployment
metadata:
  name: eightton-claude-code
  namespace: aiops-app
  labels:
    app: eightton-claude-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eightton-claude-code
  template:
    metadata:
      labels:
        app: eightton-claude-code
    spec:
      containers:
      - name: eightton-claude-code
        image: v2-zcr.cloudzcp.io/cloudzcp/eightton-claude-code:0.5.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: CLAUDE_MODEL
          value: "claude-opus-4-6"
        # === MCP all-permissions (issue #5) ===
        # `claude mcp serve` cannot answer interactive permission prompts, so the
        # MCP server runs in bypassPermissions mode (see settings.json). These are
        # baked into the image via the Dockerfile but are declared here too so the
        # requirement is explicit at the k8s layer and survives image overrides.
        - name: CLAUDE_CONFIG_DIR
          value: "/root/.claude"
        # bypassPermissions refuses to run as root unless sandbox mode is set; the
        # pod runs as root, so mark it as a trusted, isolated sandbox.
        - name: IS_SANDBOX
          value: "1"
        envFrom:
        - secretRef:
            name: eightton-claude-code-secret
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      imagePullSecrets:
      - name: v2-zcr-cloudzcp-io-robot-secret
---
apiVersion: v1
kind: Service
metadata:
  name: eightton-claude-code
  namespace: aiops-app
spec:
  selector:
    app: eightton-claude-code
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
