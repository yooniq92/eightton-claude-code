apiVersion: apps/v1
kind: Deployment
metadata:
  name: eightton-claude-code
  namespace: aiops-app
  labels:
    app: eightton-claude-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eightton-claude-code
  template:
    metadata:
      labels:
        app: eightton-claude-code
    spec:
      containers:
      - name: eightton-claude-code
        image: v2-zcr.cloudzcp.io/cloudzcp/eightton-claude-code:0.5.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: CLAUDE_MODEL
          value: "claude-opus-4-6"
        # Full-permission mode: skip interactive tool-permission prompts so all
        # MCP tools run unattended inside this trusted dev-agent container.
        - name: CLAUDE_CODE_ACCEPT_PERMISSIONS
          value: "true"
        - name: GIT_DEFAULT_BRANCH
          value: "develop"
        - name: GIT_USER_NAME
          value: "claude-code-bot"
        - name: GIT_USER_EMAIL
          value: "claude-code-bot@noreply.github.com"
        envFrom:
        - secretRef:
            name: eightton-claude-code-secret
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      imagePullSecrets:
      - name: v2-zcr-cloudzcp-io-robot-secret
---
apiVersion: v1
kind: Service
metadata:
  name: eightton-claude-code
  namespace: aiops-app
spec:
  selector:
    app: eightton-claude-code
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
