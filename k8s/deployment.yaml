apiVersion: apps/v1
kind: Deployment
metadata:
  name: eightton-claude-code
  namespace: aiops-app
  labels:
    app: eightton-claude-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eightton-claude-code
  template:
    metadata:
      labels:
        app: eightton-claude-code
    spec:
      containers:
      - name: eightton-claude-code
        image: v2-zcr.cloudzcp.io/cloudzcp/eightton-claude-code:0.5.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: CLAUDE_MODEL
          value: "claude-opus-4-6"
        # Full-permission mode: skip interactive tool-permission prompts so every
        # MCP tool runs unattended inside this trusted dev-agent container. This
        # reinforces the settings.json `bypassPermissions` mode (shipped in the
        # image at $CLAUDE_CONFIG_DIR) that `claude mcp serve` reads — together
        # they grant all MCP servers (eightton / claude-code / pitcrew) full,
        # unattended access. (`mcp serve` does not accept the
        # --dangerously-skip-permissions flag, so settings.json is the mechanism.)
        - name: CLAUDE_CODE_ACCEPT_PERMISSIONS
          value: "true"
        envFrom:
        - secretRef:
            name: eightton-claude-code-secret
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
      imagePullSecrets:
      - name: v2-zcr-cloudzcp-io-robot-secret
---
apiVersion: v1
kind: Service
metadata:
  name: eightton-claude-code
  namespace: aiops-app
spec:
  selector:
    app: eightton-claude-code
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
