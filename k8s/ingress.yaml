apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eightton-claude-code-ingress
  namespace: aiops-app
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key,Mcp-Session-Id"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Length,Content-Range,Mcp-Session-Id"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: public-nginx
  rules:
  - host: eightton-claude-code.play.cloudzcp.net
    http:
      paths:
      - backend:
          service:
            name: eightton-claude-code
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - eightton-claude-code.play.cloudzcp.net
    secretName: wildcard-play-cloudzcp-net-cert
