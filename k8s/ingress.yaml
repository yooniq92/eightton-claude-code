# ---------------------------------------------------------------------------
# Ingress — MCP 권한/트래픽 라우팅
#
# 이 Ingress는 외부 트래픽을 eightton-claude-code 서비스로 라우팅한다.
# UI에서 등록하는 3개 MCP 서버(eightton / claude-code / pitcrew)는 모두 이
# 호스트(eightton-claude-code.play.cloudzcp.net) 뒤의 백엔드로 전달된다.
#
# 권한 관련 주의:
# - cors-allow-credentials=true + Authorization 헤더 허용 → MCP 클라이언트가
#   Bearer/API-Key 인증 토큰을 전달할 수 있어야 한다(권한 부여 매개변수).
# - proxy-*-timeout 3600s → claude-code의 장시간 코드 작업/세션이 끊기지 않도록
#   비동기(long-running) 요청을 허용한다.
# - path=/ Prefix → 모든 MCP 경로가 동일 백엔드로 전달되므로, 서버별 권한 분리는
#   백엔드(deployment) 레벨에서 처리한다.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eightton-claude-code-ingress
  namespace: aiops-app
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    # 비동기/장시간 MCP 요청(코드 작업·세션) 허용 — 권한 있는 클라이언트의 작업이 timeout으로 끊기지 않도록 함
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    # Authorization 허용 → MCP 인증 토큰(Bearer JWT / X-API-Key)을 통한 권한 부여 매개변수 전달
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Length,Content-Range"
    # credentials 허용 → 인증된 MCP 클라이언트의 권한 있는 요청 허용
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: public-nginx
  rules:
  - host: eightton-claude-code.play.cloudzcp.net
    http:
      paths:
      # 모든 MCP 서버(eightton/claude-code/pitcrew) 트래픽이 이 백엔드로 전달된다.
      # 잘못된 서비스로 라우팅되면 권한 검증이 우회될 수 있으므로 name/port를 변경하지 말 것.
      - backend:
          service:
            name: eightton-claude-code
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - eightton-claude-code.play.cloudzcp.net
    secretName: wildcard-play-cloudzcp-net-cert
