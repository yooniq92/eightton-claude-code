apiVersion: v1
kind: Secret
metadata:
  name: eightton-claude-code-secret
  namespace: aiops-app
# 주의: 실제 키/토큰을 이 파일에 커밋하지 않는다.
# 아래 값은 placeholder이며, 배포 시 CI 시크릿 또는 sealed-secrets로 주입한다.
#   kubectl -n aiops-app create secret generic eightton-claude-code-secret \
#     --from-literal=ANTHROPIC_API_KEY=... \
#     --from-literal=GITHUB_TOKEN=... \
#     --from-literal=GIT_REPO_URL=...
type: Opaque
data:
  ANTHROPIC_API_KEY: <base64-encoded-key>
  GITHUB_TOKEN: <base64-encoded-token>
  GIT_REPO_URL: <base64-encoded-url>
