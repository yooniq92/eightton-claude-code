# ---------------------------------------------------------------------------
# eightton-claude-code Secret
#
# ⚠️  실제 값(특히 ANTHROPIC_API_KEY, GITHUB_TOKEN)은 절대 이 파일에 직접 적어
#     커밋하지 마세요. 아래 값들은 모두 placeholder 입니다.
#
# 운영 환경에서는 다음 중 하나로 시크릿을 주입하는 것을 권장합니다:
#   - CI/CD secret 변수 (예: GitHub Actions secrets / GitLab CI variables)에서 주입
#   - Sealed Secrets (bitnami-labs/sealed-secrets) 로 암호화하여 커밋
#   - External Secrets Operator 로 Vault/AWS Secrets Manager 등에서 동기화
#
# 로컬에서 base64 인코딩 예시:
#   echo -n '<your-anthropic-api-key>' | base64
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: eightton-claude-code-secret
  namespace: aiops-app
type: Opaque
# `data` 는 base64 인코딩된 값을 사용합니다. 아래는 placeholder 이며,
# 실제 배포 시에는 위 운영 방법으로 주입된 값으로 대체하세요.
data:
  ANTHROPIC_API_KEY: <base64-encoded-key>      # echo -n '<your-anthropic-api-key>' | base64
  GITHUB_TOKEN: <base64-encoded-token>         # echo -n '<your-github-token>' | base64
  GIT_REPO_URL: <base64-encoded-url>           # echo -n '<your-git-repo-url>' | base64
