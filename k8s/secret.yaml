# ---------------------------------------------------------------------------
# Secret — MCP 권한 토큰 (deployment.yaml의 envFrom으로 주입됨)
#
# 각 키는 특정 MCP 서버의 권한(scope)을 부여하는 인증 매개변수이다.
# 이 토큰들이 곧 "UI에서 설정하는 MCP 모든 권한"의 실제 backing 자격증명이다.
#
# 권한 매핑 / 보안 주의:
#   - GITHUB_TOKEN     → eightton.    이슈/subtask/PR write 권한.
#                        repo + workflow scope 필요. 과도한 scope(admin) 부여 금지.
#   - ANTHROPIC_API_KEY→ claude-code. 코드 작업(파일/bash/git) 실행 권한.
#   - GIT_REPO_URL     → pitcrew.     repo clone(read-only) 테스트 권한.
#
# 보안 규칙:
#   - 실제 값은 base64로 인코딩하되 Git에 평문 토큰을 커밋하지 않는다(플레이스홀더 유지).
#   - 토큰 회전 시 Deployment를 재시작해야 새 권한이 적용된다.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: eightton-claude-code-secret
  namespace: aiops-app
type: Opaque
data:
  # claude-code MCP — 코드 작업 실행 권한
  ANTHROPIC_API_KEY: <base64-encoded-key>
  # eightton MCP — 이슈/subtask/PR 관리 write 권한 (repo + workflow scope)
  GITHUB_TOKEN: <base64-encoded-token>
  # pitcrew MCP — repo clone(read-only) 테스트 권한
  GIT_REPO_URL: <base64-encoded-url>
