apiVersion: v1
kind: Secret
metadata:
  name: eightton-claude-code-secret
  namespace: aiops-app
type: Opaque
# Sensitive credentials consumed by entrypoint.sh / claude mcp serve.
# Rotation: regenerate the token/key at its provider, then either
#   1) base64-encode and update `data` below, or
#   2) replace this Secret with `kubectl create secret generic ... --from-literal=...`
# After any change, run `make restart` to roll the deployment and pick up new values.
#
# Required keys:
#   ANTHROPIC_API_KEY - Claude API key (full access). Rotate at console.anthropic.com.
#   GITHUB_TOKEN      - GitHub PAT with `repo` + `workflow` scope for push/PR.
#   GIT_REPO_URL      - https URL of the repo to clone into /workspace.
#
# Optional keys (only needed when the matching full-permission MCP server is wired in):
#   EIGHTTON_API_KEY  - API key for the eightton MCP (issues/subtasks/sessions/PR).
#   PITCREW_API_KEY   - API key for the pitcrew MCP (remote pytest runner).
# These are consumed by `claude mcp serve` when the eightton/pitcrew servers are
# configured; leave unset to run with claude-code MCP only.
data:
  ANTHROPIC_API_KEY: <base64-encoded-key>
  GITHUB_TOKEN: <base64-encoded-token>
  GIT_REPO_URL: <base64-encoded-url>
  # EIGHTTON_API_KEY: <base64-encoded-key>
  # PITCREW_API_KEY: <base64-encoded-key>
# Alternatively, supply plaintext values via stringData (k8s encodes them):
# stringData:
#   ANTHROPIC_API_KEY: "sk-ant-..."
#   GITHUB_TOKEN: "ghp_..."
#   GIT_REPO_URL: "https://github.com/your-org/your-repo.git"
#   EIGHTTON_API_KEY: "..."
#   PITCREW_API_KEY: "..."
